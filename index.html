<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#0a0e14;--surface:#111720;--card:#161d29;--border:#1e2a3a;
  --accent:#00c896;--blue:#3d8fff;--warn:#ff6b4a;--gold:#f0b429;
  --ali:#c084fc;--ali-dim:rgba(192,132,252,.12);--ali-bd:rgba(192,132,252,.28);
  --text:#c8d6e8;--dim:#6b7f96;--hi:#eaf2ff;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--hi)}
.logo em{color:var(--accent);font-style:normal}
.sub{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:9px;padding:3px 9px;border-radius:3px;display:flex;align-items:center;gap:5px}
.chip-live{background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.2);color:var(--accent)}
.chip-warn{background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.2);color:var(--gold)}
.chip-err{background:rgba(255,107,74,.08);border:1px solid rgba(255,107,74,.2);color:var(--warn)}
.dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite}
.dot-g{background:var(--accent)}.dot-o{background:var(--gold)}.dot-r{background:var(--warn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.last-sync{font-family:var(--mono);font-size:9px;color:var(--dim)}
.btn-sm{font-family:var(--mono);font-size:9px;padding:3px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--dim)}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.privacy-on{border-color:var(--gold);color:var(--gold)}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;background:var(--bg);overflow-x:auto}
.tab{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:10px 18px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--hi);border-bottom-color:var(--accent)}
.tab-panel{display:none;padding:20px 24px}
.tab-panel.active{display:block}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--accent)}.kpi.b::before{background:var(--blue)}
.kpi.o::before{background:var(--gold)}.kpi.p::before{background:var(--ali)}
.kl{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.kv{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--hi);line-height:1}
.ks{font-family:var(--mono);font-size:10px;margin-top:4px}
.pos{color:var(--accent)}.neg{color:var(--warn)}.muted{color:var(--dim)}

.sec{display:flex;align-items:center;gap:12px;margin:22px 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-lbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.sec-line{flex:1;height:1px}
.sec-tag{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.card.ali{border-color:var(--ali-bd);background:#14101e}
.ch{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ali .ch{border-bottom-color:var(--ali-bd)}
.ct{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
.cb{padding:14px 16px}
.badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px}
.bg{background:rgba(0,200,150,.12);color:var(--accent);border:1px solid rgba(0,200,150,.25)}
.br{background:rgba(255,107,74,.12);color:var(--warn);border:1px solid rgba(255,107,74,.25)}
.bo{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.bb{background:rgba(61,143,255,.12);color:var(--blue);border:1px solid rgba(61,143,255,.25)}
.bp{background:var(--ali-dim);color:var(--ali);border:1px solid var(--ali-bd)}
.bw{background:rgba(107,127,150,.1);color:var(--dim);border:1px solid rgba(107,127,150,.2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;padding:0 6px 9px 0;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
th.r,td.r{text-align:right;padding-right:0}
td{font-family:var(--mono);font-size:11.5px;padding:7px 6px 7px 0;border-bottom:1px solid rgba(30,42,58,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tk{color:var(--hi);font-weight:600}
.tag{font-size:8px;padding:1px 5px;border-radius:2px;background:var(--surface);color:var(--dim);border:1px solid var(--border)}

.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(30,42,58,.4)}
.bar-row:last-child{border-bottom:none}
.bar-lbl{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--hi);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:16px;background:var(--surface);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;opacity:.75}
.bar-val{font-family:var(--mono);font-size:10px;color:var(--hi);position:absolute;right:6px;top:50%;transform:translateY(-50%)}
.bar-pct{font-family:var(--mono);font-size:11px;width:52px;text-align:right;flex-shrink:0}

.dw{display:flex;align-items:center;gap:16px;padding:14px 16px}
.leg{flex:1;display:flex;flex-direction:column;gap:7px}
.li{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lbw{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.lb{height:100%;border-radius:2px}
.lp{margin-left:auto;color:var(--hi);font-weight:600;min-width:34px;text-align:right}

.notice{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.2);border-radius:7px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:14px;line-height:1.7}
.notice-blue{background:rgba(61,143,255,.06);border:1px solid rgba(61,143,255,.2);border-radius:7px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--blue);margin-bottom:14px;line-height:1.7}
.notice-green{background:rgba(0,200,150,.06);border:1px solid rgba(0,200,150,.2);border-radius:7px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:14px;line-height:1.7}
.loading{text-align:center;padding:50px;font-family:var(--mono);font-size:12px;color:var(--dim)}
.spin{display:inline-block;animation:rotate 1.2s linear infinite;font-size:22px;margin-bottom:10px}
@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.alert-card{border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.alert-warn{background:rgba(255,107,74,.07);border:1px solid rgba(255,107,74,.25)}
.alert-ok{background:rgba(0,200,150,.07);border:1px solid rgba(0,200,150,.25)}
.alert-info{background:rgba(61,143,255,.07);border:1px solid rgba(61,143,255,.25)}
.alert-gold{background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.25)}
.alert-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.alert-title{font-family:var(--mono);font-size:11px;font-weight:600;margin-bottom:4px}
.alert-body{font-size:12px;color:var(--dim);line-height:1.6}

.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:14px 16px}
.sector-box{border-radius:8px;padding:10px 12px;border:1px solid var(--border);background:var(--surface)}
.sector-name{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--hi);margin-bottom:3px}
.sector-pct{font-family:var(--mono);font-size:18px;font-weight:600}
.sector-bar{height:3px;border-radius:2px;margin-top:6px;opacity:.7}

/* sliders / inputs */
input[type=range]{width:100%;accent-color:var(--blue)}
.sim-input{font-family:var(--mono);font-size:12px;background:var(--surface);border:1px solid var(--border);color:var(--hi);border-radius:5px;padding:6px 10px;width:110px;outline:none;text-align:right}
.sim-input:focus{border-color:var(--blue)}

@media(max-width:800px){.g2{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}.tab{font-size:9px;padding:10px 12px}}

</head>

<div class="hdr">
  <div>
    <div class="logo">Portfolio <em>·</em> Dashboard</div>

// ════════ PRIVACY MODE ════════
let PRIVACY = localStorage.getItem('portfolio_privacy')==='1';
function togglePrivacy(){
  PRIVACY=!PRIVACY;
  localStorage.setItem('portfolio_privacy',PRIVACY?'1':'0');
  updatePrivacyBtn();
  renderAll();
}
function updatePrivacyBtn(){
  const b=document.getElementById('privacy-btn');
  b.textContent=PRIVACY?'🙈 mostrar montos':'👁️ ocultar montos';
  b.classList.toggle('privacy-on',PRIVACY);
}

// ════════ TABS ════════
let activeTab='portfolio';
function showTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids=['portfolio','evolucion','analisis','alertas','casa','agente'];
    t.classList.toggle('active',ids[i]===id);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  activeTab=id;
  if(STATE.source!=='empty'){
    if(id==='evolucion')renderEvolucion();
    if(id==='analisis')renderAnalisis();
    if(id==='alertas')renderAlertas();
    if(id==='casa')renderCasa();
    if(id==='agente')renderAgente();
  }
}

// ════════ CONFIG & FETCH ════════
let SCRIPT_URL=localStorage.getItem('portfolio_script_url')||'https://script.google.com/macros/s/AKfycbymaOoBGnUSlOQEmaa8YlMdNh6tiTtcjeZNn5fJV0PSdYvtChODbs1MLhvtVERmYe_i/exec';
const NEXO_DAILY_INTEREST = 0.17; // USD/día que paga Nexo hoy (dato real del usuario)

function parseCSV(txt){
  const rows=[];let cur='',inQ=false,row=[];
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;continue}
    if(c===','&&!inQ){row.push(cur.trim());cur='';continue}
    if((c==='\n'||c==='\r')&&!inQ){row.push(cur.trim());rows.push(row);row=[];cur='';if(c==='\r'&&txt[i+1]==='\n')i++;continue;}
    cur+=c;
  }
  if(cur||row.length){row.push(cur.trim());rows.push(row);}
  return rows;
}
function pn(s){
  if(!s||['','...','.','-'].includes(s.trim()))return null;
  const n=parseFloat(s.replace(/[$,%]/g,'').replace(/,/g,''));
  return isNaN(n)?null:n;
}
function parseCedears(txt){
  const rows=parseCSV(txt),mine=[],ali=[],cartera=[];let totales={};
  for(let i=3;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0])continue;
    const tk=r[0].trim();
    if(!tk||['','...','TOTAL','OPERACIONES CERRADAS','Ticker'].includes(tk))continue;
    const broker=(r[1]||'').trim();
    const isAli=broker==='Santander'&&tk==='SPY';
    const op={ticker:tk,broker,fecha_c:(r[5]||'').trim(),valor_c:pn(r[9]),valor_hoy:pn(r[13]),var_pct:pn(r[15]),isAli};
    if(isAli)ali.push(op);else mine.push(op);
  }
  for(let i=3;i<rows.length;i++){
    const r=rows[i];if(!r||r.length<20)continue;
    const tk=(r[19]||'').trim();
    if(!tk||tk==='...'||tk==='Ticker')continue;
    if(tk==='TOTAL'){totales={valor_c:pn(r[24]),valor_a:pn(r[27]),var_pct:pn(r[28])};continue;}
    cartera.push({ticker:tk,cant_real:pn(r[22]),precio_prom:pn(r[23]),valor_c:pn(r[24]),precio_act:pn(r[25]),valor_act:pn(r[27]),var_pct:pn(r[28]),proporcion:pn(r[30])});
  }
  return{mine,ali,cartera,totales};
}
function parseResto(txt){
  const rows=parseCSV(txt),items=[];
  for(let i=2;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0]||!r[0].trim())continue;
    if((r[1]||'').trim()==='Venta')continue;
    const vc=pn(r[7]),va=pn(r[8]),pl=pn(r[9]),plp=pn(r[10]);
    if(!va)continue;
    const pl_ok=plp!=null&&!(pl===0&&vc===va);
    items.push({fecha:(r[0]||'').trim(),cat:(r[2]||'').trim(),broker:(r[3]||'').trim(),activo:(r[4]||'').trim(),valor_c:vc||0,valor_a:va,pl:pl||0,pl_pct:plp,pl_ok});
  }
  return items;
}
function parseArs(txt){
  const rows=parseCSV(txt),items=[];
  for(let i=2;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0]||!r[0].trim())continue;
    const vc=pn(r[6]),va=pn(r[7]),pl=pn(r[8]),plp=pn(r[9]);
    if(!va||va===0)continue;
    items.push({fecha:(r[0]||'').trim(),cat:(r[1]||'').trim(),broker:(r[2]||'').trim(),activo:(r[3]||'').trim(),cant:pn(r[5])||1,valor_c:vc||0,valor_a:va,pl:pl||0,pl_pct:plp});
  }
  return items;
}
async function fetchSheet(sheet){
  if(!SCRIPT_URL)throw new Error('sin_url');
  const res=await fetch(`${SCRIPT_URL}?sheet=${sheet}`,{signal:AbortSignal.timeout(12000)});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const txt=await res.text();
  if(!txt||txt.length<50)throw new Error('vacío');
  if(txt.startsWith('{'))throw new Error(JSON.parse(txt).error||'error');
  return txt;
}

// ════════ UTILS ════════
function usd(n,d=2){
  if(n==null)return'—';
  if(PRIVACY)return'U$D •••';
  const a=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  return(n<0?'-':'')+'U$D '+a;
}
function arsFmt(n){
  if(n==null)return'—';
  if(PRIVACY)return'$ •••';
  return'$ '+n.toLocaleString('es-AR',{maximumFractionDigits:0});
}
function pct(n){if(n==null)return'—';return(n>=0?'+':'')+n.toFixed(2)+'%';}
function pc(n){return n==null?'':n>=0?'pos':'neg';}
function s(arr,k){return arr.reduce((t,o)=>t+(o[k]||0),0);}
function parseDate(str){
  if(!str)return null;
  const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11,ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  let m=str.match(/(\w+)\s+(\d+),\s*(\d+)/);
  if(m)return new Date(+m[3],months[m[1]]??0,+m[2]);
  m=str.match(/(\d+)-(\w+)-(\d+)/);
  if(m)return new Date(+m[3],months[m[2].toLowerCase()]??0,+m[1]);
  return null;
}
function daysHeld(fechaStr){
  const d=parseDate(fechaStr);
  if(!d)return null;
  return Math.max(1,Math.round((new Date()-d)/(1000*60*60*24)));
}
function cagr(vc,va,days){
  if(!vc||!va||!days||vc<=0)return null;
  const total=va/vc;
  if(total<=0)return null;
  return(Math.pow(total,365/days)-1)*100;
}

// Capa de riesgo por activo
function riskLayer(activo,cat){
  const c=(cat||'').toUpperCase(),a=(activo||'').toUpperCase();
  if(c.includes('FCI')||a==='USDT'||a==='USD')return'estable';
  if(a==='BTC'||['META','AAPL','MSFT','MELI'].includes(a))return'volatil';
  return'mercado'; // ETFs amplios: SPY QQQ SPYG XLK XLV XLE
}

  for(let d=new Date(start);d<=end;d.setMonth(d.getMonth()+1)){

    cum+=added;invested.push(added);cumInvested.push(+cum.toFixed(2));
  }
  const totalC=allLotes.reduce((s,l)=>s+(l.valor_c||0),0);
  const totalA=allLotes.reduce((s,l)=>s+(l.valor_hoy||l.valor_a||0),0);
  const growth=totalC>0?totalA/totalC:1;
  const valorEstimado=cumInvested.map((c,i)=>{const p=i/(cumInvested.length-1||1);return +((c*(1+(growth-1)*p)).toFixed(2));});

  const html=`
    <div class="kpi-row">
      <div class="kpi b"><div class="kl">Capital invertido</div><div class="kv">${usd(totalC,0)}</div><div class="ks muted">desde Nov 2025</div></div>

    <div class="card"><div class="ch"><span class="ct">Capital invertido vs valor estimado</span></div><div style="padding:16px;height:280px"><canvas id="chartEvolucion"></canvas></div></div>
    <div class="g2">
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Compras por mes</span></div><div style="padding:16px;height:200px"><canvas id="chartCompras"></canvas></div></div>
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Proyección Ali 👶🏻</span></div><div style="padding:14px 16px" id="projAli"></div></div>
    </div>`;
  document.getElementById('tab-evolucion').innerHTML=html;

  setTimeout(()=>{
    const yTicks=PRIVACY?{display:false}:{color:'#6b7f96',font:{size:9},callback:v=>'U$D '+v.toLocaleString()};
    const ctx1=document.getElementById('chartEvolucion');
    if(ctx1&&window.Chart)new Chart(ctx1,{type:'line',data:{labels:months,datasets:[
      {label:'Capital invertido',data:cumInvested,borderColor:'#3d8fff',backgroundColor:'rgba(61,143,255,.08)',fill:true,tension:.3,pointRadius:2},
      {label:'Valor estimado',data:valorEstimado,borderColor:'#00c896',backgroundColor:'rgba(0,200,150,.08)',fill:true,tension:.3,pointRadius:2},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7f96',font:{family:'IBM Plex Mono',size:10}}},tooltip:{enabled:!PRIVACY}},scales:{x:{ticks:{color:'#6b7f96',font:{size:9}},grid:{color:'#1e2a3a'}},y:{ticks:yTicks,grid:{color:'#1e2a3a'}}}}});
    const ctx2=document.getElementById('chartCompras');
    if(ctx2&&window.Chart)new Chart(ctx2,{type:'bar',data:{labels:months,datasets:[{data:invested,backgroundColor:'rgba(61,143,255,.5)',borderColor:'#3d8fff',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:!PRIVACY}},scales:{x:{ticks:{color:'#6b7f96',font:{size:9}},grid:{color:'#1e2a3a'}},y:{ticks:PRIVACY?{display:false}:{color:'#6b7f96',font:{size:9},callback:v=>'$'+v},grid:{color:'#1e2a3a'}}}}});
    const aliTotal=s(STATE.ali,'valor_hoy');
    const el=document.getElementById('projAli');
    if(el)el.innerHTML=`<div style="margin-bottom:8px;font-family:var(--mono);font-size:9px;color:var(--dim)">Tasa histórica SPY ~10% anual. Capital actual Ali: ${usd(aliTotal)}</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Año</th><th class="r">7%</th><th class="r">10%</th><th class="r">12%</th></tr></thead><tbody>
    ${[1,2,3,5,10].map(y=>`<tr><td style="color:var(--ali)">+${y}</td>${[0.07,0.10,0.12].map(r=>`<td class="r" style="color:var(--accent)">${usd(aliTotal*Math.pow(1+r,y),0)}</td>`).join('')}</tr>`).join('')}

// ════════ TAB 3: ANÁLISIS ════════
function renderAnalisis(){
  const {mine,ali,resto}=STATE;
  const allUSD=[...mine,...ali];
  const granTA=s(allUSD,'valor_hoy')+s(resto,'valor_a');

  // ── Waterfall P&L por activo ──
  const plMap={};
  allUSD.forEach(o=>{const k=o.ticker;if(!plMap[k])plMap[k]=0;plMap[k]+=(o.valor_hoy||0)-(o.valor_c||0);});
  resto.forEach(r=>{if(!r.pl_ok)return;const k=r.activo;if(!plMap[k])plMap[k]=0;plMap[k]+=r.pl||0;});
  const plArr=Object.entries(plMap).sort((a,b)=>b[1]-a[1]);

  // ── CAGR + vs SPY por lote ──
  // referencia SPY: mapa fecha→retorno usando los lotes SPY propios
  const spyLotes=[...allUSD.filter(o=>o.ticker==='SPY'),...resto.filter(r=>r.activo==='SPY')].map(l=>({
    date:parseDate(l.fecha_c||l.fecha), ret:l.var_pct!=null?l.var_pct:(l.pl_pct!=null?l.pl_pct:null)
  })).filter(x=>x.date&&x.ret!=null);
  const spyRetAt=date=>{
    if(!spyLotes.length||!date)return null;
    let best=null,bd=Infinity;
    spyLotes.forEach(sl=>{const d=Math.abs(sl.date-date);if(d<bd){bd=d;best=sl.ret;}});
    return bd<1000*60*60*24*45?best:null; // solo si hay ref a <45 días
  };

  const lotesAnalisis=allUSD.map(o=>{
    const days=daysHeld(o.fecha_c);
    const c=cagr(o.valor_c,o.valor_hoy,days);
    const spyRef=spyRetAt(parseDate(o.fecha_c));
    const vsSpy=(o.var_pct!=null&&spyRef!=null)?o.var_pct-spyRef:null;
    return{...o,days,cagr:c,vsSpy};
  }).filter(l=>l.days!=null);

  const rowsCagr=lotesAnalisis.map(l=>{
    const cagrCell=l.cagr==null?'—':`<span class="${pc(l.cagr)}">${pct(l.cagr)}</span>`;
    const vsCell=l.vsSpy==null?'<span class="muted">—</span>':(l.ticker==='SPY'?'<span class="muted">ref</span>':`<span class="badge ${l.vsSpy>=0?'bg':'br'}">${pct(l.vsSpy)}</span>`);
    return`<tr><td><span class="tk">${l.ticker}</span></td><td><span class="tag">${l.broker}</span></td><td class="r muted" style="font-size:10px">${l.days}d</td><td class="r">${pct(l.var_pct)}</td><td class="r">${cagrCell}</td><td class="r">${vsCell}</td></tr>`;
  }).join('');

  // vs SPY resumen
  const beatSpy=lotesAnalisis.filter(l=>l.vsSpy!=null&&l.ticker!=='SPY'&&l.vsSpy>0).length;
  const loseSpy=lotesAnalisis.filter(l=>l.vsSpy!=null&&l.ticker!=='SPY'&&l.vsSpy<0).length;

  // ── Break-even para perdedores ──
  const losers=[
    ...allUSD.filter(o=>o.var_pct!=null&&o.var_pct<0).map(o=>({name:o.ticker+' ('+o.broker+')',pctDown:o.var_pct,vc:o.valor_c,va:o.valor_hoy})),
    ...resto.filter(r=>r.pl_ok&&r.pl_pct!=null&&r.pl_pct<0).map(r=>({name:r.activo+' (Nexo)',pctDown:r.pl_pct,vc:r.valor_c,va:r.valor_a})),
  ];
  const rowsBE=losers.map(l=>{
    const needed=(l.vc/l.va-1)*100;
    return`<tr><td><span class="tk">${l.name}</span></td><td class="r neg">${pct(l.pctDown)}</td><td class="r" style="color:var(--gold);font-weight:600">+${needed.toFixed(1)}%</td><td class="r muted">${usd(l.vc-l.va)}</td></tr>`;
  }).join('');

  // ── Sectores (igual que antes) ──
  const SECTOR_ETF={
    SPY:{Tech:31,Health:12,Finance:13,Consumer:10,Industrial:8,Energy:4,Other:22},
    QQQ:{Tech:58,Health:6,Consumer:18,Finance:5,Industrial:3,Other:10},
    XLK:{Tech:100},SPYG:{Tech:45,Health:8,Consumer:20,Finance:8,Industrial:5,Other:14},
    META:{Tech:100},AAPL:{Tech:100},MSFT:{Tech:100},MELI:{Tech:100},
    XLV:{Health:100},XLE:{Energy:100},BTC:{Crypto:100},USDT:{Cash:100},USD:{Cash:100},
  };
  const SECTOR_COLORS={Tech:'#3d8fff',Health:'#00c896',Finance:'#f0b429',Consumer:'#c084fc',Industrial:'#6b7f96',Energy:'#ff6b4a',Other:'#2a3a4a',Crypto:'#f7931a',Cash:'#44546a'};
  const sectorMap={};
  const addSector=(t,v)=>{const comp=SECTOR_ETF[t];if(!comp)return;Object.entries(comp).forEach(([sec,p])=>{if(!sectorMap[sec])sectorMap[sec]=0;sectorMap[sec]+=v*(p/100);});};
  allUSD.forEach(o=>addSector(o.ticker,o.valor_hoy||0));
  resto.forEach(r=>addSector(r.activo,r.valor_a||0));
  const sectorTotal=Object.values(sectorMap).reduce((a,b)=>a+b,0);
  const sectorArr=Object.entries(sectorMap).sort((a,b)=>b[1]-a[1]);
  const maxSec=sectorArr[0]?sectorArr[0][1]:1;
  const sectorHTML=sectorArr.map(([sec,val])=>{
    const p=val/sectorTotal*100,color=SECTOR_COLORS[sec]||'#6b7f96';
    return`<div class="sector-box"><div class="sector-name">${sec}</div><div class="sector-pct" style="color:${color}">${p.toFixed(1)}%</div><div class="sector-bar" style="background:${color};width:${val/maxSec*100}%"></div><div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px">${usd(val,0)}</div></div>`;
  }).join('');
  const techPct=((sectorMap['Tech']||0)/sectorTotal*100).toFixed(1);

  const html=`
    <div class="kpi-row">
      <div class="kpi b"><div class="kl">Exposición tech real</div><div class="kv">${techPct}%</div><div class="ks muted">ETFs abiertos</div></div>
      <div class="kpi g"><div class="kl">Le ganás al SPY</div><div class="kv">${beatSpy}<span style="font-size:12px;color:var(--dim)"> lotes</span></div><div class="ks muted">vs ${loseSpy} que pierden</div></div>
      <div class="kpi o"><div class="kl">En rojo</div><div class="kv">${losers.length}<span style="font-size:12px;color:var(--dim)"> posiciones</span></div><div class="ks muted">ver break-even ↓</div></div>
      <div class="kpi p"><div class="kl">Aportes al P&L</div><div class="kv" style="font-size:15px">${plArr[0]?plArr[0][0]:'—'} 🏆</div><div class="ks pos">${plArr[0]?usd(plArr[0][1]):''}</div></div>
    </div>

    <div class="card"><div class="ch"><span class="ct">Waterfall · quién aporta tu ganancia</span><span class="badge bb">P&L por activo</span></div>
      <div style="padding:16px;height:320px"><canvas id="chartWaterfall"></canvas></div>
    </div>

    <div class="g2">
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Rendimiento anualizado + vs SPY</span><span class="badge bb">CAGR real por lote</span></div>
        <div style="padding:0 14px 12px;overflow-x:auto;max-height:340px;overflow-y:auto"><table><thead><tr><th>Ticker</th><th>Broker</th><th class="r">Días</th><th class="r">Total</th><th class="r">Anualiz.</th><th class="r">vs SPY</th></tr></thead><tbody>${rowsCagr}</tbody></table></div>
        <div style="padding:8px 14px;border-top:1px solid var(--border);font-family:var(--mono);font-size:9px;color:var(--dim)">"Anualiz." = a qué ritmo anual creció ese lote. Un +5% en 30 días ≈ +80% anualizado. "vs SPY" compara contra comprar SPY el mismo día.</div>
      </div>
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Break-even · qué necesitás para recuperar</span><span class="badge bo">asimetría de pérdidas</span></div>
        ${losers.length?`<div style="padding:0 14px 12px;overflow-x:auto"><table><thead><tr><th>Posición</th><th class="r">Caída</th><th class="r">Necesita subir</th><th class="r">Pérdida</th></tr></thead><tbody>${rowsBE}</tbody></table></div>
        <div style="padding:8px 14px;border-top:1px solid var(--border);font-family:var(--mono);font-size:9px;color:var(--dim)">Una caída de -50% necesita +100% para recuperar. Por eso las pérdidas grandes pesan más de lo que parecen.</div>`
        :'<div style="padding:20px;text-align:center;color:var(--accent);font-family:var(--mono);font-size:11px">🎉 Ninguna posición en rojo</div>'}
      </div>
    </div>

    <div class="card"><div class="ch"><span class="ct">Exposición por sector real</span><span class="badge bb">ETFs abiertos</span></div><div class="sector-grid">${sectorHTML}</div></div>`;

  document.getElementById('tab-analisis').innerHTML=html;

  setTimeout(()=>{
    const ctx=document.getElementById('chartWaterfall');
    if(ctx&&window.Chart){
      new Chart(ctx,{type:'bar',data:{
        labels:plArr.map(x=>x[0]),
        datasets:[{data:plArr.map(x=>+x[1].toFixed(2)),
          backgroundColor:plArr.map(x=>x[1]>=0?'rgba(0,200,150,.6)':'rgba(255,107,74,.6)'),
          borderColor:plArr.map(x=>x[1]>=0?'#00c896':'#ff6b4a'),borderWidth:1}]},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{enabled:!PRIVACY}},
          scales:{x:{ticks:PRIVACY?{display:false}:{color:'#6b7f96',font:{size:9},callback:v=>'$'+v},grid:{color:'#1e2a3a'}},
                  y:{ticks:{color:'#c8d6e8',font:{family:'IBM Plex Mono',size:10},autoSkip:false},grid:{display:false}}}}});
    }
  },100);
}

// ════════ TAB 4: ALERTAS ════════
function renderAlertas(){
  const {mine,ali,resto}=STATE;
  const allUSD=[...mine,...ali];
  const granTA=s(allUSD,'valor_hoy')+s(resto,'valor_a');
  const OBJETIVO=45000;
  const alerts=[];
  const objDelta=v=>` Impacto en objetivo casa: ${(v/OBJETIVO*100).toFixed(2)}% de los U$D 45.000.`;

  // pérdidas
  const losers=allUSD.filter(o=>o.var_pct!=null&&o.var_pct<-5);
  if(losers.length>0){
    const pl=losers.reduce((s,o)=>s+((o.valor_hoy||0)-(o.valor_c||0)),0);
    alerts.push({type:'warn',icon:'📉',title:`${losers.length} posición${losers.length>1?'es':''} con pérdida > 5%`,body:`${losers.map(o=>`${o.ticker} (${o.broker}): ${pct(o.var_pct)}`).join(' · ')}. Pérdida total: ${usd(pl)}.${objDelta(Math.abs(pl))}`});
  }

  // BTC análisis con tiempo de tenencia
  const btc=resto.find(r=>r.activo==='BTC');
  if(btc&&btc.pl_pct!=null&&btc.pl_pct<-30){
    const days=daysHeld(btc.fecha);
    const needed=((btc.valor_c/btc.valor_a-1)*100).toFixed(0);
    alerts.push({type:'warn',icon:'₿',title:`BTC: ${pct(btc.pl_pct)} tras ${days} días — zona de decisión`,body:`Está muy abajo de tu precio de entrada y necesita +${needed}% para recuperar. Históricamente BTC tuvo caídas de 40-80% seguidas tanto de rebotes fuertes como de años laterales. Es tu posición más volátil — seguila de cerca: si rompe abajo de tu punto actual conviene revisar la tesis; si consolida, puede ser zona de acumulación. Monto en juego: ${usd(btc.valor_a)}.`});
  }

  // concentración índices
  const spyFam=['SPY','QQQ','SPYG'];
  const spyVal=allUSD.filter(o=>spyFam.includes(o.ticker)).reduce((s,o)=>s+(o.valor_hoy||0),0)+resto.filter(r=>spyFam.includes(r.activo)).reduce((s,r)=>s+r.valor_a,0);
  const spyPct=spyVal/granTA*100;
  if(spyPct>45)alerts.push({type:'info',icon:'⚖️',title:`Concentración en índices USA: ${spyPct.toFixed(0)}%`,body:`SPY + QQQ + SPYG son el ${spyPct.toFixed(1)}% del portfolio. Si el mercado cae 20%, estas posiciones restan ~${usd(spyVal*0.2,0)} al objetivo casa (${(spyVal*0.2/OBJETIVO*100).toFixed(1)}% de los 45k).`});

  // Nexo interés real
  const usdtTotal=resto.filter(r=>r.activo==='USDT').reduce((s,r)=>s+r.valor_a,0);
  if(usdtTotal>100){
    const anual=NEXO_DAILY_INTEREST*365;
    const rate=(anual/usdtTotal*100).toFixed(1);
    alerts.push({type:'gold',icon:'💰',title:`Interés Nexo real: ${usd(NEXO_DAILY_INTEREST)} /día → ~${usd(anual,0)}/año (${rate}%)`,body:`Sobre tus ${usd(usdtTotal,0)} en USDT. Es plata que entra sin volatilidad — la capa más confiable para el objetivo casa. En 12 meses suma ${(anual/OBJETIVO*100).toFixed(2)}% de los 45k sin hacer nada.`});
  }

  // ganadoras
  const winners=allUSD.filter(o=>o.var_pct!=null&&o.var_pct>20);
  if(winners.length>0)alerts.push({type:'ok',icon:'🚀',title:`${winners.length} lote${winners.length>1?'s':''} con ganancia > 20%`,body:`${winners.map(o=>`${o.ticker}: ${pct(o.var_pct)}`).join(' · ')}. La ganancia no realizada suma ${usd(winners.reduce((s,o)=>s+(o.valor_hoy-o.valor_c),0))} al objetivo.`});

  // XLK máximo
  const xlk=allUSD.filter(o=>o.ticker==='XLK');
  if(xlk.length&&xlk.every(o=>o.var_pct>20))alerts.push({type:'info',icon:'📈',title:'XLK: todos tus lotes arriba de +20%',body:'Tech puro viene siendo tu mejor sector. Cuando una posición corre tanto por encima del resto, algunos inversores toman ganancias parciales para asegurar el avance hacia su objetivo. Otros la dejan correr. Depende de tu horizonte — pero tenerlo presente es clave.'});

  // Ali
  const aliTotal=s(STATE.ali,'valor_hoy');
  alerts.push({type:'ok',icon:'👶🏻',title:`Ali en 10 años: ${usd(aliTotal*Math.pow(1.10,10),0)} (10% histórico SPY)`,body:`Con ${usd(aliTotal)} actuales. Nota: el fondo de Ali es de Ali — no cuenta para el objetivo casa.`});

  const alertHTML=alerts.map(a=>`<div class="alert-card alert-${a.type}"><div class="alert-icon">${a.icon}</div><div><div class="alert-title" style="color:${a.type==='warn'?'var(--warn)':a.type==='ok'?'var(--accent)':a.type==='gold'?'var(--gold)':'var(--blue)'}">${a.title}</div><div class="alert-body">${a.body}</div></div></div>`).join('');
  document.getElementById('tab-alertas').innerHTML=`<div class="notice-green">✅ ${alerts.filter(a=>a.type==='ok').length} positivas · ⚠️ ${alerts.filter(a=>a.type==='warn').length} alertas · ℹ️ ${alerts.filter(a=>a.type==='info'||a.type==='gold').length} sugerencias — todas calculadas en vivo sobre tus datos</div>${alertHTML}`;
}

function pnG(v){ // "$3,232,245.35" -> 3232245.35
  if(v==null)return 0;
  const n=parseFloat(String(v).replace(/[$\s]/g,'').replace(/,/g,''));
  return isNaN(n)?0:n;
}
function ars(n,d=0){return PRIVACY?'•••':'$'+(n||0).toLocaleString('es-AR',{maximumFractionDigits:d});}

async function fetchGastos(){
  if(GASTOS)return GASTOS;
  const res=await fetch(GASTOS_CSV_URL,{signal:AbortSignal.timeout(12000)});
  if(!res.ok)throw new Error('gastos HTTP '+res.status);
  const rows=parseCSV(await res.text());
  const ingresos={},porCat={};let totalG=0,totalI=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0]||!r[0].trim())continue;
    const cat=(r[2]||'').trim(),monto=pnG(r[3]),quien=(r[4]||'').trim();
    if(!cat||!monto)continue;
    if(cat==='Sueldo'){ingresos[quien||'?']=(ingresos[quien||'?']||0)+monto;totalI+=monto;}
    else{porCat[cat]=(porCat[cat]||0)+monto;totalG+=monto;}
  }
  GASTOS={ingresos,porCat,totalG,totalI,periodo:'fines de junio + julio 2026 (parcial)'};
  return GASTOS;
}

async function llamarClaude(prompt){
  const key=localStorage.getItem('agente_api_key')||'';
  if(!key)throw new Error('Falta la API key — pegala en ⚙️ CONFIG (abajo de todo) y guardala. La sacás de console.anthropic.com → API Keys.');
  const headers={'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  let res;
  try{
    res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,messages:[{role:'user',content:prompt}]})});
  }catch(e){throw new Error('No se pudo conectar con api.anthropic.com — puede ser la red (¿PC del laburo con dominios bloqueados?) o un corte de conexión.');}
  if(res.status===401)throw new Error('API key inválida o vencida — revisala en ⚙️ CONFIG.');
  if(res.status===429)throw new Error('Rate limit de la API — esperá un minuto y probá de nuevo.');
  if(!res.ok){const t=await res.text().catch(()=>'');throw new Error('API '+res.status+': '+t.slice(0,150));}
  const data=await res.json();
  const txt=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
  try{return JSON.parse(txt.replace(/```json|```/g,'').trim());}
  catch(e){throw new Error('La respuesta no vino en JSON válido — probá generar de nuevo.');}
}

      <div class="kpi b"><div class="kl">Fondo de emergencia</div><div class="kv" style="font-size:16px">${ars((d.fondo_emergencia||{}).objetivo_ars)}</div><div class="ks muted">${(d.fondo_emergencia||{}).meses_de_gastos||''} meses · ${(d.fondo_emergencia||{}).donde||''}</div></div>
      <div class="kpi o"><div class="kl">% del ingreso sugerido</div><div class="kv" style="font-size:16px">${d.porcentaje_recomendado||''}%</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px" class="ag-grid2">
      <div><div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;margin-bottom:6px">JERARQUÍA DE AHORRO</div>${jer}
        <div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;margin:12px 0 6px">REGLAS PARA NO TOCAR LA PLATA</div>${reglas}
        <div style="font-size:10px;color:var(--dim);margin-top:10px">${d.plan_aumento_progresivo||''}</div></div>
      <div><div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;margin-bottom:6px">SIMULACIÓN 24 MESES (tasa <input id="inp-tasa" type="number" value="30" style="width:44px;background:var(--surface);border:1px solid var(--border);color:var(--hi);font-family:var(--mono);font-size:10px;border-radius:4px;padding:1px 4px" onchange="drawAhorroChart()">% anual ARS)</div>
        <div style="height:220px;position:relative"><canvas id="chart-ahorro"></canvas></div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:6px;text-align:center">Solo interés compuesto sobre aportes — vos controlás los supuestos.</div></div>
    </div>
    <div style="padding:0 14px 14px;font-size:11px;color:var(--text)">${d.comentario||''}</div>`;
  drawAhorroChart();
}
function drawAhorroChart(){
  const d=AGENTE_CACHE.ahorro;if(!d)return;
  const ctx=document.getElementById('chart-ahorro');if(!ctx||!window.Chart)return;
  const tasa=(+document.getElementById('inp-tasa')?.value||30)/100;
  const rMes=Math.pow(1+tasa,1/12)-1;
  const a=d.aportes_ars||{};
  const labels=[],series={chico:[],medio:[],agresivo:[]};
  ['chico','medio','agresivo'].forEach(k=>{let cap=0;for(let m=1;m<=24;m++){cap=cap*(1+rMes)+(a[k]||0);series[k].push(Math.round(cap));}});
  for(let m=1;m<=24;m++)labels.push('m'+m);
  if(chartAhorro)chartAhorro.destroy();
  chartAhorro=new Chart(ctx,{type:'line',data:{labels,datasets:[
    {label:`Chico (${ars(a.chico)})`,data:series.chico,borderColor:'#6b7f96',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0},
    {label:`Medio (${ars(a.medio)})`,data:series.medio,borderColor:'#3d8fff',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0},
    {label:`Agresivo (${ars(a.agresivo)})`,data:series.agresivo,borderColor:'#00c896',backgroundColor:'rgba(0,200,150,.06)',borderWidth:2,pointRadius:0,fill:true}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#c8d6e8',font:{size:9,family:'IBM Plex Mono'},boxWidth:12}},tooltip:{enabled:!PRIVACY}},scales:{x:{ticks:{color:'#6b7f96',font:{size:8},maxTicksLimit:8},grid:{color:'#1e2a3a'}},y:{ticks:PRIVACY?{display:false}:{color:'#6b7f96',font:{size:9},callback:v=>'$'+(v/1e6).toFixed(1)+'M'},grid:{color:'#1e2a3a'}}}}});
}

// ── Render principal del tab ──
function renderAgente(){

    <div class="kpi b"><div class="kl">Portfolio USD</div><div class="kv" style="font-size:16px" id="ag-usd">—</div></div>
  </div>
  <div class="card">
    <div style="padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div><b style="color:var(--hi);font-size:13px">💡 Mapa de flujos de ingresos</b><div style="font-size:10px;color:var(--dim)">7 flujos posibles + secuencia de 12 meses, sobre tu situación real</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--dim)">
        hs/semana <input id="inp-horas" type="number" value="5" style="width:50px;background:var(--surface);border:1px solid var(--border);color:var(--hi);font-family:var(--mono);border-radius:4px;padding:3px 6px">
        capital U$D <input id="inp-capital" type="number" value="500" style="width:70px;background:var(--surface);border:1px solid var(--border);color:var(--hi);font-family:var(--mono);border-radius:4px;padding:3px 6px">
        <button class="btn-sm" id="btn-flujos" onclick="runFlujos()" style="font-size:10px;padding:5px 14px;border-color:var(--accent);color:var(--accent)">▶ generar análisis</button>
      </div>
    </div>
    <div id="out-flujos"><div style="font-family:var(--mono);font-size:10px;color:var(--dim);padding:14px">Configurá horas y capital, y dale a generar.</div></div>
  </div>
  <div class="card">
    <div style="padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div><b style="color:var(--hi);font-size:13px">🏦 Sistema de ahorro automático</b><div style="font-size:10px;color:var(--dim)">Jerarquía de ahorro + simulación, cruzando gastos e inversiones</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--dim)">
        objetivo <select id="inp-objetivo" style="background:var(--surface);border:1px solid var(--border);color:var(--hi);font-family:var(--mono);font-size:10px;border-radius:4px;padding:3px 6px">
          <option>Fondo de emergencia</option><option>Casa propia</option><option>Inversión a largo plazo</option><option>Viaje</option></select>
        <button class="btn-sm" id="btn-ahorro" onclick="runAhorro()" style="font-size:10px;padding:5px 14px;border-color:var(--accent);color:var(--accent)">▶ generar plan</button>
      </div>
    </div>
    <div id="out-ahorro"><div style="font-family:var(--mono);font-size:10px;color:var(--dim);padding:14px">Elegí tu objetivo principal y dale a generar.</div></div>
  </div>
  <div class="card" style="padding:12px 14px">
    <div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;margin-bottom:6px">⚙️ CONFIG</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-family:var(--mono);font-size:10px;color:var(--dim)">API key Anthropic:</span>
      <input id="inp-apikey" type="password" value="${key}" placeholder="sk-ant-..." style="flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);color:var(--hi);font-family:var(--mono);font-size:10px;border-radius:4px;padding:4px 8px">
      <button class="btn-sm" onclick="localStorage.setItem('agente_api_key',document.getElementById('inp-apikey').value.trim());this.textContent='✓ guardada';const b=document.getElementById('ag-nokey');if(b)b.style.display=document.getElementById('inp-apikey').value.trim()?'none':'block'">guardar</button>

  fetchGastos().then(updateAgenteKpis).catch(()=>{

  });
  if(AGENTE_CACHE.flujos)renderFlujosResult(AGENTE_CACHE.flujos);
  if(AGENTE_CACHE.ahorro)renderAhorroResult(AGENTE_CACHE.ahorro);

function updateAgenteKpis(){
  if(!GASTOS)return;
  const i=document.getElementById('ag-ing');if(!i)return;
  i.textContent=ars(GASTOS.totalI);
  document.getElementById('ag-gas').textContent=ars(GASTOS.totalG);
  document.getElementById('ag-usd').textContent=PRIVACY?'•••':usd(s(STATE.mine,'valor_hoy')+s(STATE.resto,'valor_a'),0);
}

// ════════ INIT ════════
updatePrivacyBtn();
loadAll();

</script>
