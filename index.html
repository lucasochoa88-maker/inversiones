<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#0a0e14;--surface:#111720;--card:#161d29;--border:#1e2a3a;
  --accent:#00c896;--blue:#3d8fff;--warn:#ff6b4a;--gold:#f0b429;
  --ali:#c084fc;--ali-dim:rgba(192,132,252,.12);--ali-bd:rgba(192,132,252,.28);
  --text:#c8d6e8;--dim:#6b7f96;--hi:#eaf2ff;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--hi)}
.logo em{color:var(--accent);font-style:normal}
.sub{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.chip{font-family:var(--mono);font-size:9px;padding:3px 9px;border-radius:3px;display:flex;align-items:center;gap:5px}
.chip-live{background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.2);color:var(--accent)}
.chip-warn{background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.2);color:var(--gold)}
.chip-err{background:rgba(255,107,74,.08);border:1px solid rgba(255,107,74,.2);color:var(--warn)}
.dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite}
.dot-g{background:var(--accent)}.dot-o{background:var(--gold)}.dot-r{background:var(--warn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.last-sync{font-family:var(--mono);font-size:9px;color:var(--dim)}
.btn-sm{font-family:var(--mono);font-size:9px;padding:3px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--dim)}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;background:var(--bg)}
.tab{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:10px 18px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--hi);border-bottom-color:var(--accent)}
.tab-panel{display:none;padding:20px 24px}
.tab-panel.active{display:block}

/* ── LAYOUT ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--accent)}.kpi.b::before{background:var(--blue)}
.kpi.o::before{background:var(--gold)}.kpi.p::before{background:var(--ali)}
.kl{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.kv{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--hi);line-height:1}
.ks{font-family:var(--mono);font-size:10px;margin-top:4px}
.pos{color:var(--accent)}.neg{color:var(--warn)}.muted{color:var(--dim)}

.sec{display:flex;align-items:center;gap:12px;margin:22px 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-lbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.sec-line{flex:1;height:1px}
.sec-tag{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.card.ali{border-color:var(--ali-bd);background:#14101e}
.ch{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ali .ch{border-bottom-color:var(--ali-bd)}
.ct{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
.cb{padding:14px 16px}
.badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px}
.bg{background:rgba(0,200,150,.12);color:var(--accent);border:1px solid rgba(0,200,150,.25)}
.br{background:rgba(255,107,74,.12);color:var(--warn);border:1px solid rgba(255,107,74,.25)}
.bo{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.bb{background:rgba(61,143,255,.12);color:var(--blue);border:1px solid rgba(61,143,255,.25)}
.bp{background:var(--ali-dim);color:var(--ali);border:1px solid var(--ali-bd)}
.bw{background:rgba(107,127,150,.1);color:var(--dim);border:1px solid rgba(107,127,150,.2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}

table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;padding:0 6px 9px 0;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
th.r,td.r{text-align:right;padding-right:0}
td{font-family:var(--mono);font-size:11.5px;padding:7px 6px 7px 0;border-bottom:1px solid rgba(30,42,58,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tk{color:var(--hi);font-weight:600}
.tag{font-size:8px;padding:1px 5px;border-radius:2px;background:var(--surface);color:var(--dim);border:1px solid var(--border)}

.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(30,42,58,.4)}
.bar-row:last-child{border-bottom:none}
.bar-lbl{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--hi);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:16px;background:var(--surface);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;opacity:.75}
.bar-val{font-family:var(--mono);font-size:10px;color:var(--hi);position:absolute;right:6px;top:50%;transform:translateY(-50%)}
.bar-pct{font-family:var(--mono);font-size:11px;width:52px;text-align:right;flex-shrink:0}

.dw{display:flex;align-items:center;gap:16px;padding:14px 16px}
.leg{flex:1;display:flex;flex-direction:column;gap:7px}
.li{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lbw{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.lb{height:100%;border-radius:2px}
.lp{margin-left:auto;color:var(--hi);font-weight:600;min-width:34px;text-align:right}

.notice{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.2);border-radius:7px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:14px;line-height:1.7}
.notice-blue{background:rgba(61,143,255,.06);border:1px solid rgba(61,143,255,.2);border-radius:7px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--blue);margin-bottom:14px;line-height:1.7}
.notice-green{background:rgba(0,200,150,.06);border:1px solid rgba(0,200,150,.2);border-radius:7px;padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:14px;line-height:1.7}
.loading{text-align:center;padding:50px;font-family:var(--mono);font-size:12px;color:var(--dim)}
.spin{display:inline-block;animation:rotate 1.2s linear infinite;font-size:22px;margin-bottom:10px}
@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── ALERTAS ── */
.alert-card{border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.alert-warn{background:rgba(255,107,74,.07);border:1px solid rgba(255,107,74,.25)}
.alert-ok{background:rgba(0,200,150,.07);border:1px solid rgba(0,200,150,.25)}
.alert-info{background:rgba(61,143,255,.07);border:1px solid rgba(61,143,255,.25)}
.alert-gold{background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.25)}
.alert-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.alert-title{font-family:var(--mono);font-size:11px;font-weight:600;margin-bottom:4px}
.alert-body{font-size:12px;color:var(--dim);line-height:1.6}

/* ── PROYECCIÓN ALI ── */
.proj-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.proj-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;flex:1;min-width:110px;text-align:center}
.proj-yr{font-family:var(--mono);font-size:9px;color:var(--dim);margin-bottom:4px}
.proj-val{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ali)}

/* ── SECTOR MAP ── */
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:14px 16px}
.sector-box{border-radius:8px;padding:10px 12px;border:1px solid var(--border);background:var(--surface)}
.sector-name{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--hi);margin-bottom:3px}
.sector-pct{font-family:var(--mono);font-size:18px;font-weight:600}
.sector-bar{height:3px;border-radius:2px;margin-top:6px;opacity:.7}

@media(max-width:800px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}.tabs{overflow-x:auto}.tab{font-size:9px;padding:10px 12px}}
</style>
</head>

let activeTab = 'portfolio';
function showTab(id) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids=['portfolio','evolucion','analisis','alertas','casa'];
    t.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  activeTab = id;
  if(id==='evolucion' && STATE.source!=='empty') renderEvolucion();
  if(id==='analisis'  && STATE.source!=='empty') renderAnalisis();
  if(id==='alertas'   && STATE.source!=='empty') renderAlertas();
  if(id==='casa'      && STATE.source!=='empty') renderCasa();
}

// ════════════════════════════════════════════════════════
//  CONFIG & FETCH
// ════════════════════════════════════════════════════════
let SCRIPT_URL = localStorage.getItem('portfolio_script_url') || 'https://script.google.com/macros/s/AKfycbymaOoBGnUSlOQEmaa8YlMdNh6tiTtcjeZNn5fJV0PSdYvtChODbs1MLhvtVERmYe_i/exec';
document.getElementById('setup-banner') && (document.getElementById('setup-banner').style.display='none');

function parseCSV(txt) {
  const rows=[]; let cur='',inQ=false,row=[];
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;continue}
    if(c===','&&!inQ){row.push(cur.trim());cur='';continue}
    if((c==='\n'||c==='\r')&&!inQ){row.push(cur.trim());rows.push(row);row=[];cur='';if(c==='\r'&&txt[i+1]==='\n')i++;continue;}
    cur+=c;
  }
  if(cur||row.length){row.push(cur.trim());rows.push(row);}
  return rows;
}
function pn(s){
  if(!s||['','...','.','-'].includes(s.trim()))return null;
  const n=parseFloat(s.replace(/[$,%]/g,'').replace(/,/g,''));
  return isNaN(n)?null:n;
}

function parseCedears(txt) {
  const rows=parseCSV(txt),mine=[],ali=[],cartera=[];let totales={};
  for(let i=3;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0])continue;
    const tk=r[0].trim();
    if(!tk||['','...','TOTAL','OPERACIONES CERRADAS','Ticker'].includes(tk))continue;
    const broker=(r[1]||'').trim();
    const isAli=broker==='Santander'&&tk==='SPY';
    const op={ticker:tk,broker,fecha_c:(r[5]||'').trim(),valor_c:pn(r[9]),valor_hoy:pn(r[13]),var_pct:pn(r[15]),isAli};
    if(isAli)ali.push(op);else mine.push(op);
  }
  for(let i=3;i<rows.length;i++){
    const r=rows[i];if(!r||r.length<20)continue;
    const tk=(r[19]||'').trim();
    if(!tk||tk==='...'||tk==='Ticker')continue;
    if(tk==='TOTAL'){totales={valor_c:pn(r[24]),valor_a:pn(r[27]),var_pct:pn(r[28])};continue;}
    cartera.push({ticker:tk,cant_real:pn(r[22]),precio_prom:pn(r[23]),valor_c:pn(r[24]),precio_act:pn(r[25]),valor_act:pn(r[27]),var_pct:pn(r[28]),proporcion:pn(r[30])});
  }
  return{mine,ali,cartera,totales};
}

function parseResto(txt) {
  const rows=parseCSV(txt),items=[];
  for(let i=2;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0]||!r[0].trim())continue;
    if((r[1]||'').trim()==='Venta')continue;
    const vc=pn(r[7]),va=pn(r[8]),pl=pn(r[9]),plp=pn(r[10]);
    if(!va)continue;
    const pl_ok=plp!=null&&!(pl===0&&vc===va);
    items.push({fecha:(r[0]||'').trim(),cat:(r[2]||'').trim(),broker:(r[3]||'').trim(),activo:(r[4]||'').trim(),valor_c:vc||0,valor_a:va,pl:pl||0,pl_pct:plp,pl_ok});
  }
  return items;
}

function parseArs(txt) {
  const rows=parseCSV(txt),items=[];
  for(let i=2;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0]||!r[0].trim())continue;
    const vc=pn(r[6]),va=pn(r[7]),pl=pn(r[8]),plp=pn(r[9]);
    if(!va||va===0)continue;
    items.push({fecha:(r[0]||'').trim(),cat:(r[1]||'').trim(),broker:(r[2]||'').trim(),activo:(r[3]||'').trim(),cant:pn(r[5])||1,valor_c:vc||0,valor_a:va,pl:pl||0,pl_pct:plp});
  }
  return items;
}

async function fetchSheet(sheet) {
  if(!SCRIPT_URL) throw new Error('sin_url');
  const res=await fetch(`${SCRIPT_URL}?sheet=${sheet}`,{signal:AbortSignal.timeout(12000)});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const txt=await res.text();
  if(!txt||txt.length<50) throw new Error('vacío');
  if(txt.startsWith('{')) throw new Error(JSON.parse(txt).error||'error');
  return txt;
}

async function loadAll() {
  setStatus('cargando...','warn');
  document.getElementById('tab-portfolio').innerHTML='<div class="loading"><div class="spin">⟳</div><br>Actualizando...</div>';
  try {
    const [csvCed,csvResto,csvArs]=await Promise.all([fetchSheet('cedears'),fetchSheet('resto'),fetchSheet('ars')]);
    const ced=parseCedears(csvCed);
    STATE={mine:ced.mine,ali:ced.ali,cartera:ced.cartera,totales:ced.totales,resto:parseResto(csvResto),ars:parseArs(csvArs),source:'live'};
    setStatus('en vivo','live');
    document.getElementById('sync-time').textContent='actualizado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    STATE={...FALLBACK,source:'fallback'};
    setStatus('datos del 2 jul','err');
  }
  renderAll();
}

function setStatus(txt,type) {
  const el=document.getElementById('sync-status');

  el.innerHTML=`<span class="dot ${type==='live'?'dot-g':type==='err'?'dot-r':'dot-o'}"></span>${txt}`;
}

function usd(n,d=2){if(n==null)return'—';const a=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});return(n<0?'-':'')+'U$D '+a;}
function pct(n){if(n==null)return'—';return(n>=0?'+':'')+n.toFixed(2)+'%';}
function pc(n){return n==null?'':n>=0?'pos':'neg';}
function s(arr,k){return arr.reduce((t,o)=>t+(o[k]||0),0);}

function renderEvolucion() {
  // Construir timeline de capital invertido desde fechas de compra
  const {mine,ali,resto}=STATE;
  const allLotes=[...mine,...ali,...resto.filter(r=>r.valor_c>0)];

  // Parsear fechas
  const parseDate=str=>{
    if(!str)return null;
    const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11,
      ene:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
    // "Nov 27, 2025"
    let m=str.match(/(\w+)\s+(\d+),\s*(\d+)/);
    if(m)return new Date(+m[3],months[m[1]]||0,+m[2]);
    // "1-oct-2025"
    m=str.match(/(\d+)-(\w+)-(\d+)/);
    if(m)return new Date(+m[3],months[m[2].toLowerCase()]||0,+m[1]);
    // "26-ene-2026"
    return null;
  };

  const events=allLotes.map(l=>({date:parseDate(l.fecha_c||l.fecha),val:l.valor_c||0}))
    .filter(e=>e.date&&e.val>0)
    .sort((a,b)=>a.date-b.date);

  if(!events.length){
    document.getElementById('tab-evolucion').innerHTML='<div class="loading">Sin datos de fechas.</div>';
    return;
  }

  // Generar puntos mensuales
  const start=new Date(events[0].date);start.setDate(1);
  const end=new Date();end.setDate(1);
  const months=[],invested=[],cumInvested=[];
  let cum=0;
  for(let d=new Date(start);d<=end;d.setMonth(d.getMonth()+1)){
    const label=d.toLocaleDateString('es-AR',{month:'short',year:'2-digit'});
    months.push(label);
    const monthEnd=new Date(d.getFullYear(),d.getMonth()+1,0);
    const added=events.filter(e=>e.date>=d&&e.date<=monthEnd).reduce((s,e)=>s+e.val,0);
    cum+=added;
    invested.push(added);
    cumInvested.push(+cum.toFixed(2));
  }

  // Valor actual aproximado por mes (lineal desde compra al valor actual)
  const totalC=allLotes.reduce((s,l)=>s+(l.valor_c||0),0);
  const totalA=allLotes.reduce((s,l)=>s+(l.valor_hoy||l.valor_a||0),0);
  const growth=totalC>0?totalA/totalC:1;
  const valorEstimado=cumInvested.map((c,i)=>{
    const progress=i/(cumInvested.length-1||1);
    return +((c*(1+(growth-1)*progress)).toFixed(2));
  });

  const html=`
    <div class="kpi-row">
      <div class="kpi b"><div class="kl">Capital invertido</div><div class="kv">${usd(totalC,0)}</div><div class="ks muted">desde Nov 2025</div></div>
      <div class="kpi g"><div class="kl">Valor actual</div><div class="kv">${usd(totalA,0)}</div><div class="ks pos">+${usd(totalA-totalC,0)}</div></div>
      <div class="kpi o"><div class="kl">Rendimiento total</div><div class="kv">${pct((totalA-totalC)/totalC*100)}</div><div class="ks muted">desde inicio</div></div>
      <div class="kpi p"><div class="kl">Tiempo invertido</div><div class="kv" style="font-size:16px">${Math.round((new Date()-new Date(events[0].date))/(1000*60*60*24*30))} meses</div><div class="ks muted">primer lote Nov 2025</div></div>
    </div>
    <div class="card"><div class="ch"><span class="ct">Capital invertido vs valor estimado</span><span class="badge bb">desde inicio</span></div>
      <div style="padding:16px;height:280px"><canvas id="chartEvolucion"></canvas></div>
    </div>
    <div class="g2">
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Compras por mes</span></div>
        <div style="padding:16px;height:200px"><canvas id="chartCompras"></canvas></div>
      </div>
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Proyección Ali 👶🏻 · SPY ~10% anual</span></div>
        <div style="padding:14px 16px" id="projAli"></div>
      </div>
    </div>`;

  document.getElementById('tab-evolucion').innerHTML=html;

  // Chart evolución
  setTimeout(()=>{
    const ctx1=document.getElementById('chartEvolucion');
    if(ctx1&&window.Chart){
      new Chart(ctx1,{type:'line',data:{labels:months,datasets:[
        {label:'Capital invertido',data:cumInvested,borderColor:'#3d8fff',backgroundColor:'rgba(61,143,255,.08)',fill:true,tension:.3,pointRadius:2},
        {label:'Valor estimado',data:valorEstimado,borderColor:'#00c896',backgroundColor:'rgba(0,200,150,.08)',fill:true,tension:.3,pointRadius:2},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7f96',font:{family:'IBM Plex Mono',size:10}}}},scales:{x:{ticks:{color:'#6b7f96',font:{size:9}},grid:{color:'#1e2a3a'}},y:{ticks:{color:'#6b7f96',font:{size:9},callback:v=>'U$D '+v.toLocaleString()},grid:{color:'#1e2a3a'}}}}});
    }
    const ctx2=document.getElementById('chartCompras');
    if(ctx2&&window.Chart){
      new Chart(ctx2,{type:'bar',data:{labels:months,datasets:[{label:'Invertido',data:invested,backgroundColor:'rgba(61,143,255,.5)',borderColor:'#3d8fff',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b7f96',font:{size:9}},grid:{color:'#1e2a3a'}},y:{ticks:{color:'#6b7f96',font:{size:9},callback:v=>'$'+v},grid:{color:'#1e2a3a'}}}}});
    }

    // Proyección Ali
    const aliTotal=s(STATE.ali,'valor_hoy');
    const rates=[0.07,0.10,0.12];
    const years=[1,2,3,5,10];
    const projHTML=`<div style="margin-bottom:8px;font-family:var(--mono);font-size:9px;color:var(--dim)">Tasa histórica SPY: ~10% anual. Capital actual Ali: ${usd(aliTotal)}</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Año</th><th class="r">7% (conserv.)</th><th class="r">10% (histórico)</th><th class="r">12% (optimista)</th></tr></thead><tbody>
    ${years.map(y=>`<tr><td style="color:var(--ali)">+${y} año${y>1?'s':''}</td>${rates.map(r=>`<td class="r" style="color:var(--accent)">${usd(aliTotal*Math.pow(1+r,y),0)}</td>`).join('')}</tr>`).join('')}
    </tbody></table></div>`;
    const el=document.getElementById('projAli');
    if(el)el.innerHTML=projHTML;
  },100);
}

function renderAnalisis() {
  const {mine,ali,cartera,resto}=STATE;
  const allUSD=[...mine,...ali];
  const granTA=s(allUSD,'valor_hoy')+s(resto,'valor_a');

  // Exposición por sector (abriendo ETFs)
  // Pesos aproximados de composición de ETFs relevantes
  const SECTOR_ETF={
    SPY: {Tech:31,Health:12,Finance:13,Consumer:10,Industrial:8,Energy:4,Other:22},
    QQQ: {Tech:58,Health:6,Consumer:18,Finance:5,Industrial:3,Other:10},
    XLK: {Tech:100},
    SPYG:{Tech:45,Health:8,Consumer:20,Finance:8,Industrial:5,Other:14},
    META:{Tech:100},
    AAPL:{Tech:100},
    MSFT:{Tech:100},
    MELI:{Tech:100},
    XLV: {Health:100},
    XLE: {Energy:100},
    BTC: {Crypto:100},
    USDT:{Cash:100},
  };
  const SECTOR_COLORS={Tech:'#3d8fff',Health:'#00c896',Finance:'#f0b429',Consumer:'#c084fc',Industrial:'#6b7f96',Energy:'#ff6b4a',Other:'#2a3a4a',Crypto:'#f7931a',Cash:'#1e2a3a'};

  const sectorMap={};
  const addSector=(ticker,valor)=>{
    const comp=SECTOR_ETF[ticker];
    if(!comp)return;
    Object.entries(comp).forEach(([s,pct])=>{
      if(!sectorMap[s])sectorMap[s]=0;
      sectorMap[s]+=valor*(pct/100);
    });
  };

  [...mine,...ali].forEach(o=>addSector(o.ticker,o.valor_hoy||0));
  resto.forEach(r=>addSector(r.activo,r.valor_a||0));

  const sectorTotal=Object.values(sectorMap).reduce((a,b)=>a+b,0);
  const sectorArr=Object.entries(sectorMap).sort((a,b)=>b[1]-a[1]);
  const maxSec=sectorArr[0]?sectorArr[0][1]:1;

  const sectorHTML=sectorArr.map(([sec,val])=>{
    const pctVal=val/sectorTotal*100;
    const color=SECTOR_COLORS[sec]||'#6b7f96';
    return`<div class="sector-box"><div class="sector-name">${sec}</div><div class="sector-pct" style="color:${color}">${pctVal.toFixed(1)}%</div><div class="sector-bar" style="background:${color};width:${val/maxSec*100}%"></div><div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px">${usd(val,0)}</div></div>`;
  }).join('');

  // Concentración por activo
  const assetMap={};
  [...mine,...ali].forEach(o=>{if(!assetMap[o.ticker])assetMap[o.ticker]=0;assetMap[o.ticker]+=o.valor_hoy||0;});
  resto.forEach(r=>{const k=r.activo;if(!assetMap[k])assetMap[k]=0;assetMap[k]+=r.valor_a||0;});
  const assetArr=Object.entries(assetMap).sort((a,b)=>b[1]-a[1]);
  const maxAsset=assetArr[0]?assetArr[0][1]:1;
  const assetHTML=assetArr.map(([ticker,val])=>{
    const pctVal=val/granTA*100;
    const isHigh=pctVal>25;
    return`<div class="bar-row"><span class="bar-lbl">${ticker}</span><div class="bar-track"><div class="bar-fill" style="width:${val/maxAsset*100}%;background:${isHigh?'var(--warn)':'var(--blue)'}"></div><span class="bar-val">${usd(val,0)}</span></div><span class="bar-pct ${isHigh?'neg':'muted'}">${pctVal.toFixed(1)}%</span></div>`;
  }).join('');

  // Correlación simple (texto)
  const spyCorr=`SPY, QQQ y SPYG tienen correlación >0.90 entre sí. Aproximadamente el ${(()=>{
    const spyV=assetMap['SPY']||0,qqqV=assetMap['QQQ']||0,spygV=assetMap['SPYG']||0;
    return ((spyV+qqqV+spygV)/granTA*100).toFixed(0);
  })()}% de tu portfolio USD se mueve en sintonía con el mercado amplio.`;

  // Tech real
  const techPct=((sectorMap['Tech']||0)/sectorTotal*100).toFixed(1);

  const html=`
    <div class="kpi-row">
      <div class="kpi b"><div class="kl">Exposición tech real</div><div class="kv">${techPct}%</div><div class="ks muted">abriendo todos los ETFs</div></div>
      <div class="kpi g"><div class="kl">Activos distintos</div><div class="kv">${assetArr.length}</div><div class="ks muted">en todo el portfolio</div></div>
      <div class="kpi o"><div class="kl">Mayor posición</div><div class="kv" style="font-size:16px">${assetArr[0]?assetArr[0][0]:'—'}</div><div class="ks muted">${assetArr[0]?((assetArr[0][1]/granTA*100).toFixed(1)+'% del total'):'—'}</div></div>
      <div class="kpi" style="border-color:rgba(255,107,74,.3)"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--warn)"></div><div class="kl">Concentración tech</div><div class="kv ${+techPct>50?'neg':'pos'}">${+techPct>50?'Alta':'Moderada'}</div><div class="ks muted">${+techPct>50?'Considerar diversificar':'Dentro de parámetros'}</div></div>
    </div>
    <div class="notice-blue">ℹ️ ${spyCorr}</div>
    <div class="g2">
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Exposición por sector real</span><span class="badge bb">ETFs abiertos</span></div><div class="sector-grid">${sectorHTML}</div></div>
      <div class="card" style="margin-bottom:0"><div class="ch"><span class="ct">Concentración por activo</span><span class="badge br">>25% = alto</span></div><div class="cb">${assetHTML}</div></div>
    </div>
    <div class="card"><div class="ch"><span class="ct">Correlación entre posiciones</span></div>
      <div class="cb">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
          <div style="background:var(--surface);border-radius:8px;padding:12px;border:1px solid rgba(255,107,74,.2)"><div style="font-family:var(--mono);font-size:10px;color:var(--warn);margin-bottom:6px">Alta correlación (>0.85)</div><div style="font-size:12px;color:var(--dim);line-height:1.8">SPY ↔ QQQ<br>SPY ↔ SPYG<br>QQQ ↔ SPYG<br>SPY ↔ AAPL</div></div>
          <div style="background:var(--surface);border-radius:8px;padding:12px;border:1px solid rgba(240,180,41,.2)"><div style="font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:6px">Correlación media (0.5-0.85)</div><div style="font-size:12px;color:var(--dim);line-height:1.8">SPY ↔ XLK<br>SPY ↔ META<br>QQQ ↔ MSFT<br>SPY ↔ MELI</div></div>
          <div style="background:var(--surface);border-radius:8px;padding:12px;border:1px solid rgba(0,200,150,.2)"><div style="font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:6px">Baja correlación (<0.5)</div><div style="font-size:12px;color:var(--dim);line-height:1.8">SPY ↔ BTC<br>SPY ↔ XLE<br>SPY ↔ XLV<br>SPY ↔ USDT</div></div>
        </div>
      </div>
    </div>`;

  document.getElementById('tab-analisis').innerHTML=html;

  // Chart sectores
  setTimeout(()=>{
    // no chart needed, using sector grid
  },100);
}

// ════════════════════════════════════════════════════════
function renderAlertas() {
  const {mine,ali,cartera,resto}=STATE;
  const allUSD=[...mine,...ali];
  const granTA=s(allUSD,'valor_hoy')+s(resto,'valor_a');

  // Calcular alertas
  const alerts=[];

  // 1. Posiciones con pérdida > 5%
  const losers=allUSD.filter(o=>o.var_pct!=null&&o.var_pct<-5);
  if(losers.length>0){
    const total=losers.reduce((s,o)=>s+(o.valor_hoy||0),0);
    const pl=losers.reduce((s,o)=>s+((o.valor_hoy||0)-(o.valor_c||0)),0);
    alerts.push({type:'warn',icon:'📉',title:`${losers.length} posición${losers.length>1?'es':''} con pérdida > 5%`,body:`${losers.map(o=>`${o.ticker} (${o.broker}): ${pct(o.var_pct)}`).join(' · ')}. Pérdida total: ${usd(pl)}. Podría considerarse venta con pérdida para compensar ganancias fiscales.`});
  }

  // 2. BTC pérdida grande
  const btc=resto.find(r=>r.activo==='BTC');
  if(btc&&btc.pl_pct<-30){
    alerts.push({type:'warn',icon:'₿',title:'BTC con pérdida significativa',body:`Posición BTC en Nexo: ${pct(btc.pl_pct)} (${usd(btc.pl)}). Representa el ${((btc.valor_a/granTA)*100).toFixed(1)}% del portfolio total. Evaluar si mantener o tomar la pérdida.`});
  }

  // 3. Concentración alta en SPY family
  const spyFam=['SPY','QQQ','SPYG'];
  const spyVal=allUSD.filter(o=>spyFam.includes(o.ticker)).reduce((s,o)=>s+(o.valor_hoy||0),0)
    + resto.filter(r=>spyFam.includes(r.activo)).reduce((s,r)=>s+r.valor_a,0);
  const spyPct=spyVal/granTA*100;
  if(spyPct>45){
    alerts.push({type:'info',icon:'⚖️',title:`Alta concentración en índices USA (${spyPct.toFixed(0)}%)`,body:`SPY + QQQ + SPYG representan el ${spyPct.toFixed(1)}% de tu portfolio. Es una apuesta fuerte al mercado americano. No es necesariamente malo, pero si el mercado cae 20%, tu portfolio cae ~${(spyPct*0.2).toFixed(0)}% solo por estas posiciones.`});
  }

  // 4. USDT rendimiento
  const usdtTotal=resto.filter(r=>r.activo==='USDT').reduce((s,r)=>s+r.valor_a,0);
  if(usdtTotal>500){
    const anualInterest=usdtTotal*0.115;
    alerts.push({type:'gold',icon:'💰',title:`USDT en Nexo generando intereses: ~${usd(anualInterest,0)}/año`,body:`Tenés ${usd(usdtTotal,0)} en USDT al 11.5% anual en Nexo. Eso es ~${usd(anualInterest/12,0)}/mes en intereses. Asegurate de que la tasa siga activa en tu cuenta.`});
  }

  // 5. Rebalanceo sugerido
  const techPct=((()=>{
    const TECH=['META','AAPL','MSFT','XLK'];
    return allUSD.filter(o=>TECH.includes(o.ticker)).reduce((s,o)=>s+(o.valor_hoy||0),0)
      + resto.filter(r=>TECH.includes(r.activo)).reduce((s,r)=>s+r.valor_a,0);
  })()/granTA*100);
  if(techPct>30){
    alerts.push({type:'info',icon:'🔄',title:`Exposición tech directa alta: ${techPct.toFixed(0)}%`,body:`Sin contar los ETFs, META + AAPL + MSFT + XLK representan el ${techPct.toFixed(1)}% del portfolio. Si sumás la exposición tech dentro de SPY/QQQ, el total supera el 50%. Próximas compras en sectores como Salud (XLV) o Energía (XLE) mejorarían la diversificación.`});
  }

  // 6. Posiciones ganadoras grandes
  const winners=allUSD.filter(o=>o.var_pct!=null&&o.var_pct>20);
  if(winners.length>0){
    alerts.push({type:'ok',icon:'🚀',title:`${winners.length} posición${winners.length>1?'es':''} con ganancia > 20%`,body:`${winners.map(o=>`${o.ticker}: ${pct(o.var_pct)}`).join(' · ')}. Excelente rendimiento. Si alguna representa más del 15% del portfolio, podría ser momento de tomar parcialmente la ganancia para rebalancear.`});
  }

  // 7. Ali proyección
  const aliTotal=s(STATE.ali,'valor_hoy');
  const aliIn10=aliTotal*Math.pow(1.10,10);
  alerts.push({type:'ok',icon:'👶🏻',title:`Ali en 10 años: ${usd(aliIn10,0)} (tasa histórica SPY)`,body:`Con ${usd(aliTotal)} actuales y 10% anual histórico del SPY, el portfolio de Ali llegaría a ${usd(aliIn10,0)} en 2036. Cada compra mensual acelera esa curva significativamente.`});

  // 8. Próxima compra sugerida
  const sectorDef=['Salud (XLV)','Energía (XLE)','Internacional (VEA/EEM)'];
  alerts.push({type:'info',icon:'🎯',title:'Sugerencia próxima compra',body:`Basado en tu portfolio actual, los sectores subrepresentados son: ${sectorDef.join(', ')}. XLV ya tenés en Nexo — podrías reforzarla. Agregar un ETF internacional (VEA o EEM) reduciría la concentración en USA.`});

  const alertHTML=alerts.map(a=>`
    <div class="alert-card alert-${a.type}">
      <div class="alert-icon">${a.icon}</div>
      <div><div class="alert-title" style="color:${a.type==='warn'?'var(--warn)':a.type==='ok'?'var(--accent)':a.type==='gold'?'var(--gold)':'var(--blue)'}">${a.title}</div>
      <div class="alert-body">${a.body}</div></div>
    </div>`).join('');

  const html=`
    <div class="notice-green">✅ ${alerts.filter(a=>a.type==='ok').length} señales positivas · ⚠️ ${alerts.filter(a=>a.type==='warn').length} alertas · ℹ️ ${alerts.filter(a=>a.type==='info'||a.type==='gold').length} sugerencias</div>
    ${alertHTML}`;

  document.getElementById('tab-alertas').innerHTML=html;
}

// ════════════════════════════════════════════════════════
function renderCasa() {
  const OBJETIVO = 45000;
  const {mine,ali,resto} = STATE;
  const actual = s(mine,'valor_hoy') + s(ali,'valor_hoy') + s(resto,'valor_a');
  const pctAlcanzado = Math.min(actual / OBJETIVO * 100, 100);
  const falta = Math.max(OBJETIVO - actual, 0);
  const listo = actual >= OBJETIVO;

  // Arco SVG
  const R = 80, stroke = 16;
  const circ = Math.PI * R; // semicírculo
  const filled = pctAlcanzado / 100 * circ;
  const color = listo ? '#00c896' : pctAlcanzado >= 75 ? '#00c896' : pctAlcanzado >= 50 ? '#f0b429' : '#3d8fff';

  const html = `
    <div style="max-width:520px;margin:0 auto;text-align:center;padding-top:20px">

      <!-- Arco de progreso -->
      <div style="position:relative;display:inline-block;margin-bottom:8px">
        <svg width="240" height="130" viewBox="0 0 240 130">
          <!-- Track -->
          <path d="M 20 120 A 100 100 0 0 1 220 120"
            fill="none" stroke="#1e2a3a" stroke-width="${stroke}" stroke-linecap="round"/>
          <!-- Fill -->
          <path d="M 20 120 A 100 100 0 0 1 220 120"
            fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
            stroke-dasharray="${filled} ${circ}"
            style="transition:stroke-dasharray 1s ease"/>
          <!-- Valor actual -->
          <text x="120" y="90" text-anchor="middle" font-family="IBM Plex Mono" font-size="22" font-weight="600" fill="#eaf2ff">${pctAlcanzado.toFixed(1)}%</text>
          <text x="120" y="110" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#6b7f96">del objetivo</text>
        </svg>
      </div>

      <!-- Números principales -->
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#6b7f96;margin-bottom:24px">
        ${listo
          ? `<span style="color:#00c896;font-size:16px;font-weight:600">🏠 Objetivo alcanzado</span>`
          : `Faltan <span style="color:#eaf2ff;font-weight:600">${usd(falta,0)}</span>`
        }
      </div>

      <!-- Barra lineal -->
      <div style="background:#1e2a3a;border-radius:6px;height:10px;margin:0 0 28px;overflow:hidden">
        <div style="height:100%;width:${pctAlcanzado}%;background:${color};border-radius:6px;transition:width 1s ease"></div>
      </div>

      <!-- KPIs -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px">
        <div style="background:#161d29;border:1px solid #1e2a3a;border-radius:9px;padding:14px">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6b7f96;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px">Portfolio actual</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:#eaf2ff">${usd(actual,0)}</div>
        </div>
        <div style="background:#161d29;border:1px solid ${color}44;border-radius:9px;padding:14px">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6b7f96;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px">Objetivo</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:${color}">${usd(OBJETIVO,0)}</div>
        </div>
        <div style="background:#161d29;border:1px solid #1e2a3a;border-radius:9px;padding:14px">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6b7f96;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px">${listo?'Excedente':'Falta'}</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:${listo?'#00c896':'#eaf2ff'}">${usd(Math.abs(OBJETIVO-actual),0)}</div>
        </div>
      </div>

      <!-- Milestones -->
      <div style="text-align:left">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#6b7f96;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">Hitos</div>
        ${[25,50,75,100].map(hito=>{
          const hitVal = OBJETIVO * hito / 100;
          const done = actual >= hitVal;
          return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #1e2a3a22">

            </div>
            <div style="flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;color:${done?'#eaf2ff':'#6b7f96'}">${usd(hitVal,0)} <span style="color:#6b7f96">(${hito}%)</span></div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${done?color:'#6b7f96'}">${done?'✅ alcanzado':'pendiente'}</div>
          </div>`;
        }).join('')}
      </div>

    </div>`;

  document.getElementById('tab-casa').innerHTML = html;
}
